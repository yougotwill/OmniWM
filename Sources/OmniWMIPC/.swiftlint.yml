parent_config: ../../.swiftlint.yml

# Schema and manifest files are intentionally verbose; keep correctness rules
# inherited from the root config, but reduce warning noise for generated-style
# declarations and doc-heavy string payloads.
line_length:
  warning: 180
  error: 260
  ignores_comments: true

type_body_length:
  warning: 400
  error: 800

file_length:
  warning: 1500
  error: 3000

function_body_length:
  warning: 120
  error: 220

cyclomatic_complexity:
  warning: 25
  error: 60
