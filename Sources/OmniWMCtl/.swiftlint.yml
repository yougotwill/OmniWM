parent_config: ../../.swiftlint.yml

# CLI parsing, rendering, and completion generation naturally create matrix-like
# switch logic. Keep root safety rules, but relax maintainability thresholds.
line_length:
  warning: 150
  error: 220
  ignores_comments: true

type_body_length:
  warning: 500
  error: 800

file_length:
  warning: 800
  error: 1000

function_body_length:
  warning: 100
  error: 130

cyclomatic_complexity:
  warning: 15
  error: 30
